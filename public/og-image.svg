<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#374151;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5e7eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Moon Icon -->
  <circle cx="600" cy="200" r="60" fill="#fbbf24" stroke="#f59e0b" stroke-width="3"/>
  <circle cx="580" cy="180" r="15" fill="#1f2937"/>
  
  <!-- Title -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="64" font-weight="bold" text-anchor="middle" fill="url(#title)">Sight Moon</text>
  
  <!-- Subtitle -->
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#d1d5db">Discover the moon&apos;s position in the sky</text>
  
  <!-- Compass -->
  <circle cx="600" cy="420" r="40" fill="none" stroke="#6b7280" stroke-width="3"/>
  <line x1="600" y1="380" x2="600" y2="460" stroke="#000000" stroke-width="4" stroke-linecap="round"/>
  <line x1="560" y1="420" x2="640" y2="420" stroke="#000000" stroke-width="4" stroke-linecap="round"/>
  <text x="600" y="370" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#6b7280">N</text>
  <text x="600" y="470" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#6b7280">S</text>
  <text x="650" y="425" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#6b7280">E</text>
  <text x="550" y="425" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#6b7280">W</text>
  
  <!-- Features -->
  <g transform="translate(600, 520)">
    <!-- Location -->
    <circle cx="-150" cy="0" r="25" fill="#3b82f6"/>
    <text x="-150" y="5" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="white">📍</text>
    <text x="-150" y="35" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#9ca3af">Location</text>
    
    <!-- Compass -->
    <circle cx="-50" cy="0" r="25" fill="#10b981"/>
    <text x="-50" y="5" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="white">🧭</text>
    <text x="-50" y="35" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#9ca3af">Compass</text>
    
    <!-- Date -->
    <circle cx="50" cy="0" r="25" fill="#f59e0b"/>
    <text x="50" y="5" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="white">📅</text>
    <text x="50" y="35" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#9ca3af">Date</text>
    
    <!-- Data -->
    <circle cx="150" cy="0" r="25" fill="#8b5cf6"/>
    <text x="150" y="5" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="white">📊</text>
    <text x="150" y="35" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#9ca3af">Data</text>
  </g>
</svg>
